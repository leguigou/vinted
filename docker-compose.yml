services:
  vinted-alerts:
    build: .
    container_name: vinted-alerts
    restart: unless-stopped
    environment:
      VINTED_ALERTS_HOST: 0.0.0.0
      VINTED_ALERTS_PORT: 8787
      VINTED_ALERTS_DB_PATH: /data/vinted_alerts.db
      VINTED_ALERTS_ADMIN_USERNAME: ${VINTED_ALERTS_ADMIN_USERNAME:-admin}
      VINTED_ALERTS_ADMIN_PASSWORD: ${VINTED_ALERTS_ADMIN_PASSWORD:-admin123}
      VINTED_ALERTS_FETCH_API_ENABLED: ${VINTED_ALERTS_FETCH_API_ENABLED:-false}
      VINTED_ALERTS_FETCH_API_URL: ${VINTED_ALERTS_FETCH_API_URL:-}
      VINTED_ALERTS_FETCH_API_TOKEN: ${VINTED_ALERTS_FETCH_API_TOKEN:-}
    volumes:
      - vinted-alerts-data:/data
    ports:
      - "8787:8787"

volumes:
  vinted-alerts-data:
