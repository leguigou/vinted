<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vinted Alerts</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main id="loginShell" class="shell authShell">
      <section class="panel authPanel">
        <h1>Vinted Alerts</h1>
        <p>Connecte-toi pour accéder à tes recherches et à ton bot Telegram.</p>
        <form id="loginForm" class="stack">
          <label>
            Utilisateur
            <input name="username" autocomplete="username" value="admin" required />
          </label>
          <label>
            Mot de passe
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit">Connexion</button>
          <div id="loginError" class="help error"></div>
        </form>
      </section>
    </main>

    <main id="appShell" class="shell" hidden>
      <header class="topbar">
        <div>
          <h1>Vinted Alerts</h1>
          <p>Surveillance locale de recherches Vinted avec notifications Telegram.</p>
        </div>
        <div class="topActions">
          <span id="currentUser" class="muted"></span>
          <button id="logout" type="button">Déconnexion</button>
          <button id="checkNow" class="primary">Vérifier maintenant</button>
        </div>
      </header>

      <section id="adminPanel" class="panel" hidden>
        <div class="sectionTitle">
          <h2>Utilisateurs</h2>
          <span id="usersSummary" class="muted"></span>
        </div>
        <form id="userForm" class="userForm">
          <label>
            Utilisateur
            <input name="username" required />
          </label>
          <label>
            Mot de passe
            <input name="password" type="password" required />
          </label>
          <label class="checkboxLabel">
            <input name="is_admin" type="checkbox" />
            Admin
          </label>
          <button type="submit">Créer</button>
          <small id="userError"></small>
        </form>
        <div id="users" class="list compactList"></div>
      </section>

      <section class="grid">
        <article class="panel">
          <h2>Connexion Telegram</h2>
          <form id="settingsForm" class="stack">
            <label>
              Token du bot
              <input name="telegram_bot_token" autocomplete="off" placeholder="123456:ABC..." />
            </label>
            <label>
              Chat ID
              <input name="telegram_chat_id" autocomplete="off" placeholder="123456789" />
            </label>
            <div class="actions">
              <button type="submit">Enregistrer</button>
              <button type="button" id="findChat">Trouver mon Chat ID</button>
              <button type="button" id="testTelegram">Tester</button>
            </div>
          </form>
          <div id="telegramHelp" class="help"></div>
        </article>

        <article class="panel">
          <h2>Nouvelle recherche</h2>
          <form id="searchForm" class="stack">
            <label>
              Nom
              <input name="name" placeholder="Air Force 1 taille 42" required />
            </label>
            <label>
              URL de recherche Vinted
              <input name="url" placeholder="https://www.vinted.fr/catalog?search_text=..." required />
            </label>
            <label>
              Intervalle en secondes
              <input name="interval_seconds" type="number" min="60" value="180" />
            </label>
            <button type="submit">Ajouter la recherche</button>
          </form>
        </article>
      </section>

      <section class="panel">
        <div class="sectionTitle">
          <h2>Recherches actives</h2>
          <span id="status" class="muted"></span>
        </div>
        <div id="searches" class="list"></div>
      </section>

      <section class="panel">
        <div class="sectionTitle">
          <h2>Derniers articles détectés</h2>
          <span id="itemsSummary" class="muted"></span>
        </div>
        <div id="items" class="items"></div>
        <div id="itemsPagination" class="pagination" hidden>
          <button type="button" id="itemsPrev">Précédent</button>
          <span id="itemsPage" class="muted"></span>
          <button type="button" id="itemsNext">Suivant</button>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
